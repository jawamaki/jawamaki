<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> <!-- Etiquetas para que Google te encuentre -->
    <title>Jawamaki | Artesanías y Catálogo Online</title>
    <meta name="description" content="Descubre el catálogo exclusivo de Jawamaki. Artesanías únicas hechas a mano con materiales de alta calidad. ¡Pide la tuya por WhatsApp!">
    <meta name="keywords" content="Jawamaki, artesanías, hecho a mano, catálogo artesanal, productos únicos">
    <link rel="canonical" href="https://jawamaki.github.io/jawamaki/">

<!-- Etiquetas para que se vea bien al compartir el link en redes sociales -->
    <meta property="og:title" content="Jawamaki - Artesanías Hechas a Mano">
    <meta property="og:description" content="Explora nuestro catálogo de piezas únicas creadas con tradición.">
    <meta property="og:image" content="producto1.jpg"> 
    <meta property="og:url" content="https://jawamaki.github.io/jawamaki/">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Estilos Colores Tierra */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4efe9; /* Beige claro */
            color: #4a3728; /* Marrón oscuro */
            margin: 0;
            padding: 0;
        }

        header {
    background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url("./logo_fondo web.png");
    background-size: cover;
    background-position: center;
    color: #8c5230;
    text-align: center;
    padding: 12rem 1rem;
    height: 70vh;
    display: flex;
    flex-direction: column;    /* Coloca el título sobre el subtítulo */
    justify-content: flex-end; /* Empuja TODO el texto hacia el borde inferior */
    align-items: center; 
    padding-bottom: 8px;      /* Cambia este número para subir o bajar el texto un poco más */
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
                }
       header h1 {
    font-size: 1.5rem;    /* Un poco más grande pero no tosco */
    letter-spacing: 3px;  /* Esto separa las letras como en la foto */
    font-weight: 300;     /* Hace la letra más delgada y elegante */
    color: #8c5230;
           -webkit-text-stroke: 1px black; /* Grosor de 1px y color negro */
    text-shadow: none; /* Quitamos la sombra difuminada para que el borde se vea nítido */
    margin-bottom: 5px;
}

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Cuadrícula de 3 columnas */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: white;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            text-align: center;
    border: 1px solid #e0d7cd; /* Este borde color crema es el secreto */
}

        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #e0d7cd;
        }

        .card-info {
            padding: 1.5rem;
        }

        .card-info h3 {
            margin: 0 0 0.5rem 0;
            color: #8c5230;
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            display: block;
        }

        /* Botón de WhatsApp */
        .btn-whatsapp {
            display: inline-block;
            background-color: #8c5230;
            color: white;
            padding: 0.8rem 1.5rem;
            text-decoration: none;
            border-radius: 0px;
            font-weight: bold;
            transition: background 0.3s;    
    font-size: 0.7rem;
    letter-spacing: 1px;
        }

        .btn-whatsapp:hover {
            background-color: #128c7e;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
    <h1>BIENVENIDO A JAWAMAKI - EXPLORA NUESTRO LEGADO</h1>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- Producto 1 -->
            <div class="card">
                <img src="producto1.jpg" alt=" nombbre de la imagen ">
                <div class="card-info">
                    <h3>Llama de alpaca</h3>
                    <span class="price">$10</span>
                    <a href="https://wa.me" class="btn-whatsapp" target="_blank">Comprar por WhatsApp</a>
                </div>
            </div>

            <!-- Producto 2 -->
            <div class="card">
                <img src="producto2.jpg" alt="Nombre del Producto">
                <div class="card-info">
                    <h3>Tejido en Lana</h3>
                    <span class="price">$40.00</span>
                    <a href="https://wa.me" class="btn-whatsapp" target="_blank">Comprar por WhatsApp</a>
                </div>
            </div>

            <!-- Producto 3 -->
            <div class="card">
                <img src="producto3.jpg" alt="Nombre del Producto">
                <div class="card-info">
                    <h3>Tallado en Madera</h3>
                    <span class="price">$35.00</span>
                    <a href="https://wa.me" class="btn-whatsapp" target="_blank">Comprar por WhatsApp</a>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <p>&copy; 2026 Jawamaki_Perú - Catálogo Digital</p>
    </footer>

</body>
</html>
